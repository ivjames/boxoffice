# Sample nginx vhost for the boxoffice app on the lab980 droplet.
#
# This is exactly what `bin/boxoffice add-tenant` and lab980's own
# `provision-site` write to /etc/nginx/sites-available/<fqdn> — a plain
# proxy-to-port block, no per-app location logic (static files are served
# by the app itself via WhiteNoise, so nginx never needs to know about
# staticfiles/ or media/).
#
# Two kinds of vhost are created from this same template for a typical
# boxoffice deploy:
#
#   1. boxo.show (+ www)      — the platform host (marketing/landing, tenant
#      signup, /admin/). It's the bare apex, provisioned once by
#      `provision-site @ --domain boxo.show` (see DEPLOY.md).
#   2. <tenant>.boxo.show     — one per onboarded theater, written by
#      `boxoffice add-tenant <tenant>`. ALL of these proxy to the SAME
#      127.0.0.1:$PORT as #1 — TenantMiddleware discriminates by the Host
#      header, so no per-tenant app process or port is needed.
#
# certbot --nginx rewrites this in place to add the 443 server block + the
# 80->443 redirect; the file below is the pre-certbot starting point.

server {
    listen 80;
    listen [::]:80;
    server_name FQDN_PLACEHOLDER;   # e.g. boxo.show or roxy.boxo.show

    location / {
        proxy_pass http://127.0.0.1:PORT_PLACEHOLDER;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
