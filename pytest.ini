[pytest]
DJANGO_SETTINGS_MODULE = config.settings.dev
python_files = tests.py test_*.py *_tests.py
markers =
    multiprocess_concurrency: real OS-process concurrency tests against an on-disk SQLite (and, optionally, Postgres) file -- see orders/test_concurrency_multiprocess.py. Slower than the rest of the suite; included in a normal `pytest` run, deselect in a hurry with `pytest -m "not multiprocess_concurrency"`.
