<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>You've been added to {{ organization.name }}</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; color: #1a1a1a; background: #f4f4f5; margin: 0; padding: 24px;">
    <div style="max-width: 520px; margin: 0 auto; background: #ffffff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb;">
        <div style="background: {{ organization.primary_color }}; padding: 20px; text-align: center;">
            <span style="color: #ffffff; font-size: 18px; font-weight: 700;">{{ organization.name }}</span>
        </div>
        <div style="padding: 24px;">
            <h1 style="font-size: 20px; margin: 0 0 8px; color: {{ organization.primary_color }};">You've been added to the team</h1>
            <p style="margin: 0 0 20px; color: #374151;">
                Your account for the <strong>{{ organization.name }}</strong> box office on Boxo.show
                is ready. Set a password to sign in.
            </p>
            <p style="margin: 0 0 20px;">
                <a href="{{ set_password_url }}" style="display: inline-block; background: {{ organization.accent_color }}; color: #ffffff; text-decoration: none; font-weight: 600; padding: 10px 20px; border-radius: 6px;">Set your password</a>
            </p>
            <p style="margin: 0; font-size: 13px; color: #6b7280;">If you weren't expecting this, you can ignore this email.</p>
        </div>
    </div>
</body>
</html>
