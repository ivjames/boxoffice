<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank you — {{ organization.name }}</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; color: #1a1a1a; background: #f4f4f5; margin: 0; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb;">
        <div style="background: {{ organization.primary_color }}; padding: 24px; text-align: center;">
            {% if logo_url %}
                <img src="{{ logo_url }}" alt="{{ organization.name }}" height="40" style="height: 40px; width: auto; display: inline-block;">
            {% else %}
                <span style="color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: 0.01em;">{{ organization.name }}</span>
            {% endif %}
        </div>

        <div style="padding: 24px;">
            <h1 style="font-size: 20px; margin: 0 0 4px; color: {{ organization.primary_color }};">Thank you for your donation</h1>
            <p style="margin: 0 0 16px;"><strong>Amount: ${{ amount }}</strong></p>

            {% if campaign.acknowledgment %}
                <p style="margin: 0 0 16px; color: #374151;">{{ campaign.acknowledgment|linebreaksbr }}</p>
            {% endif %}

            <p style="margin: 0 0 24px;">
                <a href="{{ receipt_url }}" style="display: inline-block; background: {{ organization.accent_color }}; color: #ffffff; text-decoration: none; font-weight: 600; padding: 10px 20px; border-radius: 6px;">View your receipt online</a>
            </p>

            <p style="color: #6b7280; margin: 24px 0 0;">Thank you for your support — {{ organization.name }}</p>
        </div>
    </div>
</body>
</html>
